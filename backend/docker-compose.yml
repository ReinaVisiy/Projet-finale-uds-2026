# docker-compose.yml — orchestration complete du backend AGRYCAM
#
# Lance PostgreSQL (avec toutes les bases necessaires), le serveur Eureka,
# l'API Gateway, puis les 10 microservices metier.
#
# Utilisation :
#   1) Copier .env.example en .env a la racine de backend/ et remplir les
#      valeurs (JWT_SECRET, INTERNAL_SERVICE_SECRET, cles NotchPay...)
#   2) docker compose up --build
#
# Toutes les valeurs sensibles viennent de .env (jamais commitees).
#
# ===================================================================
# Limites memoire (mem_limit) et JAVA_TOOL_OPTIONS
# ===================================================================
# L'instance AWS ne dispose que de ~2 Go de RAM pour 13 conteneurs
# (12 microservices Java + PostgreSQL). Sans limite, un service qui
# fuit de la memoire peut faire tomber tout l'hote (swap sature, OOM
# killer aleatoire). On fixe donc :
#   - mem_limit : plafond dur par conteneur (cgroup). Si un service le
#     depasse, Docker tue CE conteneur seul plutot que de laisser le
#     systeme entier partir en vrille.
#   - JAVA_TOOL_OPTIONS : tas (-Xmx) reduit, pile de threads plus
#     petite (-Xss), metaspace plafonne, GC serial (leger, adapte a un
#     petit tas). Ces reglages font tenir chaque JVM dans sa limite.
# Les 3 services les moins critiques pour une demonstration
# (certification, notification, avis) recoivent les plus petites
# limites : ce sont ceux que le script scripts/memory-watchdog.sh
# arrete en priorite si la memoire disponible devient trop faible.
# ===================================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: agrycam-postgres
    restart: unless-stopped
    mem_limit: 220m
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-2026}
    volumes:
      - agrycam-pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  eureka-server:
    build: ./eureka-server
    container_name: agrycam-eureka-server
    restart: unless-stopped
    mem_limit: 150m
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx90m -Xss256k -XX:MaxMetaspaceSize=80m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    container_name: agrycam-api-gateway
    restart: unless-stopped
    mem_limit: 170m
    depends_on:
      - eureka-server
    environment:
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx100m -Xss256k -XX:MaxMetaspaceSize=90m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8765:8765"

  auth-service:
    build: ./auth-service
    container_name: agrycam-auth-service
    restart: unless-stopped
    mem_limit: 130m
    depends_on:
      - eureka-server
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      UTILISATEUR_SERVICE_URL: http://utilisateur-service:8081
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx70m -Xss256k -XX:MaxMetaspaceSize=70m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8080:8080"

  utilisateur-service:
    build: ./utilisateur-service
    container_name: agrycam-utilisateur-service
    restart: unless-stopped
    mem_limit: 130m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/utilisateur_db
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-2026}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx70m -Xss256k -XX:MaxMetaspaceSize=70m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8081:8081"

  produit-service:
    build: ./produit-service
    container_name: agrycam-produit-service
    restart: unless-stopped
    mem_limit: 190m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/produit_db
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-2026}
      JWT_SECRET: ${JWT_SECRET}
      AVIS_SERVICE_URL: http://avis-service:8085
      CERTIFICATION_SERVICE_URL: http://certification-service:8086
      UTILISATEUR_SERVICE_URL: http://utilisateur-service:8081
      NOTIFICATION_SERVICE_URL: http://notification-service:8089
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx110m -Xss256k -XX:MaxMetaspaceSize=90m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8082:8082"

  message-service:
    build: ./message-service
    container_name: agrycam-message-service
    restart: unless-stopped
    mem_limit: 100m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/message_db
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-2026}
      JWT_SECRET: ${JWT_SECRET}
      UTILISATEUR_SERVICE_URL: http://utilisateur-service:8081
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx55m -Xss256k -XX:MaxMetaspaceSize=60m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8083:8083"

  signalement-service:
    build: ./signalement-service
    container_name: agrycam-signalement-service
    restart: unless-stopped
    mem_limit: 80m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/signalement_db
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-2026}
      JWT_SECRET: ${JWT_SECRET}
      PRODUIT_SERVICE_URL: http://produit-service:8082
      UTILISATEUR_SERVICE_URL: http://utilisateur-service:8081
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx45m -Xss256k -XX:MaxMetaspaceSize=55m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8084:8084"

  avis-service:
    build: ./avis-service
    container_name: agrycam-avis-service
    restart: unless-stopped
    mem_limit: 90m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/avis_db
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-2026}
      JWT_SECRET: ${JWT_SECRET}
      UTILISATEUR_SERVICE_URL: http://utilisateur-service:8081
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx50m -Xss256k -XX:MaxMetaspaceSize=55m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8085:8085"

  certification-service:
    build: ./certification-service
    container_name: agrycam-certification-service
    restart: unless-stopped
    mem_limit: 90m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/certification_db
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-2026}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx50m -Xss256k -XX:MaxMetaspaceSize=55m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8086:8086"

  paiement-service:
    build: ./paiement-service
    container_name: agrycam-paiement-service
    restart: unless-stopped
    mem_limit: 140m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/paiement_db
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-2026}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NOTCHPAY_SECRET_KEY: ${NOTCHPAY_SECRET_KEY}
      NOTCHPAY_PUBLIC_KEY: ${NOTCHPAY_PUBLIC_KEY}
      CERTIFICATION_SERVICE_URL: http://certification-service:8086
      COMMANDE_SERVICE_URL: http://commande-service:8088
      UTILISATEUR_SERVICE_URL: http://utilisateur-service:8081
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx80m -Xss256k -XX:MaxMetaspaceSize=70m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8087:8087"

  commande-service:
    build: ./commande-service
    container_name: agrycam-commande-service
    restart: unless-stopped
    mem_limit: 160m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/commande_db
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-2026}
      JWT_SECRET: ${JWT_SECRET}
      PRODUIT_SERVICE_URL: http://produit-service:8082
      UTILISATEUR_SERVICE_URL: http://utilisateur-service:8081
      PAIEMENT_SERVICE_URL: http://paiement-service:8087
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx90m -Xss256k -XX:MaxMetaspaceSize=80m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8088:8088"

  notification-service:
    build: ./notification-service
    container_name: agrycam-notification-service
    restart: unless-stopped
    mem_limit: 90m
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/notification_db
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-2026}
      JWT_SECRET: ${JWT_SECRET}
      EUREKA_URI: http://eureka-server:8761/eureka/
      JAVA_TOOL_OPTIONS: "-Xmx50m -Xss256k -XX:MaxMetaspaceSize=55m -XX:+UseSerialGC -XX:TieredStopAtLevel=1"
    ports:
      - "8089:8089"

volumes:
  agrycam-pgdata:
