      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-2026}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NOTCHPAY_SECRET_KEY: ${NOTCHPAY_SECRET_KEY}
      NOTCHPAY_PUBLIC_KEY: ${NOTCHPAY_PUBLIC_KEY}
      CERTIFICATION_SERVICE_URL: http://certification-service:8086
      COMMANDE_SERVICE_URL: http://commande-service:8088
      UTILISATEUR_SERVICE_URL: http://utilisateur-service:8081
