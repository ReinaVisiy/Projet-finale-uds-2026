# Configuration du port du service (defaut: 8087)
server.port=${PORT:8087}
spring.application.name=paiement-service

# Configuration de la base de donnees PostgreSQL
# Harmonise avec le reste des microservices AgryCam : DATABASE_URL /
# DATABASE_USERNAME / DATABASE_PASSWORD (voir README backend), plutot que
# des variables DB_HOST/DB_PORT/DB_USER/DB_PASSWORD propres a ce service.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/paiement_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuration JWT (Secret partage avec les autres services d'AgryCam)
# Doit rester IDENTIQUE partout, sinon ce service rejette silencieusement
# les tokens valides emis par auth-service (voir README backend, section Securite).
jwt.secret=${JWT_SECRET}

# Configuration de la passerelle de paiement NotchPay.
# notchpay.public-key sert a la fois a creer et a verifier un paiement
# (cf. doc NotchPay : header "Authorization" = cle publique brute, sans
# prefixe Bearer). notchpay.secret-key est reserve a la verification des
# signatures de webhook (non utilise pour l'instant).
notchpay.api.url=https://api.notchpay.co
notchpay.public-key=${NOTCHPAY_PUBLIC_KEY:}
notchpay.secret-key=${NOTCHPAY_SECRET_KEY:}

# Services externes (notification post-paiement + recuperation du profil client)
# Une fois qu'une transaction NotchPay est confirmee (ou echoue/expire),
# paiement-service previent le service metier concerne pour qu'il mette a
# jour son propre statut (commande VALIDEE/ANNULEE, certification PAYE/NON_PAYE).
certification.service.url=${CERTIFICATION_SERVICE_URL:http://localhost:8086}
commande.service.url=${COMMANDE_SERVICE_URL:http://localhost:8088}

# NotchPay exige un email (et accepte un telephone) client, que
# paiement-service ne recoit pas directement du frontend : on va chercher
# ces infos aupres d'utilisateur-service au moment de l'initiation, plutot
# que de modifier le contrat d'API du frontend.
utilisateur.service.url=${UTILISATEUR_SERVICE_URL:http://localhost:8081}

# URL du frontend (et non de ce service) : sert a construire l'URL de
# callback NotchPay vers laquelle le client est redirige apres paiement
# (succes ou echec confondus : NotchPay ne distingue qu'un seul callback,
# le statut final se lit ensuite via GET /api/paiements/{id}/verifier).
# Le frontend doit exposer un ecran a cette route (voir README).
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Eureka Client - enregistrement aupres du serveur de decouverte AGRYCAM
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
