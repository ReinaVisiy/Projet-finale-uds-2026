# Configuration du port du service (defaut: 8090)
server.port=${PORT:8090}
spring.application.name=paiement-service

# Configuration de la base de donnees PostgreSQL
# Harmonise avec le reste des microservices AgryCam : DATABASE_URL /
# DATABASE_USERNAME / DATABASE_PASSWORD (voir README backend), plutot que
# des variables DB_HOST/DB_PORT/DB_USER/DB_PASSWORD propres a ce service.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/paiement_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuration JWT (Secret partage avec les autres services d'AgryCam)
# Doit rester IDENTIQUE partout, sinon ce service rejette silencieusement
# les tokens valides emis par auth-service (voir README backend, section Securite).
jwt.secret=${JWT_SECRET:AgryCamSecuriseCleJWT2026UniversiteDschang}

# Configuration de la passerelle de paiement Simiz (sandbox)
# Valeurs par defaut vides (et non obligatoires) : si ces cles ne sont pas
# configurees, le service demarre quand meme et PaiementService bascule
# automatiquement sur sa simulation locale de secours (voir son
# try/catch autour de l'appel a Simiz) plutot que de planter au demarrage.
simiz.api.url=https://api.simiz.io/v1
simiz.secret-key=${SIMIZ_SECRET_KEY:}
simiz.public-key=${SIMIZ_PUBLIC_KEY:}

# URL du frontend (et non de ce service) : sert a construire les URLs de
# retour Simiz (successUrl/cancelUrl) vers lesquelles le client est
# redirige apres paiement. Le frontend doit exposer un ecran a ces routes
# qui declenche ensuite GET /api/paiements/{id}/verifier (voir README).
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Eureka Client - enregistrement aupres du serveur de decouverte AGRYCAM
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
