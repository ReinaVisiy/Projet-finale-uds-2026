# Configuration du port du service (defaut: 8090)
server.port=${PORT:8090}
spring.application.name=paiement-service

# Configuration de la base de donnees PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/paiement_simiz_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuration JWT (Secret partage avec les autres services d'AgryCam)
jwt.secret=${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc04024a12c9ca9a149bc278000c2424b1747906}

# Configuration de la passerelle de paiement Simiz (sandbox)
simiz.api.url=https://api.simiz.io/v1
simiz.secret-key=${SIMIZ_SECRET_KEY}
simiz.public-key=${SIMIZ_PUBLIC_KEY}

# Configuration de l'integration inter-services d'AgryCam
utilisateur.service.url=${UTILISATEUR_SERVICE_URL:http://localhost:8081}

# Eureka Client - enregistrement aupres du serveur de decouverte AGRYCAM
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
