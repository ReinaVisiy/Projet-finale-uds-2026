# ===================================================================
# Configuration de la passerelle API - Projet AGRYCAM
# Point d'entree unique pour le frontend : une requete /api/xxx/**
# est routee vers le bon microservice en le cherchant dans eureka-server
# (voir com.agrycam.apigateway.config.CorsConfig pour le CORS).
# ===================================================================

spring.application.name=api-gateway
server.port=${PORT:8765}

# ---- Eureka Client : la passerelle s'enregistre elle aussi, et surtout
# ---- l'utilise pour resoudre les URLs lb://<nom-du-service> ci-dessous.
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# On definit les routes explicitement (plutot que la decouverte
# automatique spring.cloud.gateway.discovery.locator) pour garder un
# mapping clair et previsible entre chaque prefixe /api/xxx et son
# microservice, et eviter d'exposer accidentellement une route pour
# un service qui ne devrait pas etre appele directement par le frontend.

# auth-service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# utilisateur-service
spring.cloud.gateway.routes[1].id=utilisateur-service
spring.cloud.gateway.routes[1].uri=lb://utilisateur-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/utilisateurs/**

# produit-service (produits + categories)
spring.cloud.gateway.routes[2].id=produit-service
spring.cloud.gateway.routes[2].uri=lb://produit-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/produits/**,/api/categories/**

# message-service
spring.cloud.gateway.routes[3].id=message-service
spring.cloud.gateway.routes[3].uri=lb://message-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/messages/**

# signalement-service
spring.cloud.gateway.routes[4].id=signalement-service
spring.cloud.gateway.routes[4].uri=lb://signalement-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/signalements/**

# avis-service
spring.cloud.gateway.routes[5].id=avis-service
spring.cloud.gateway.routes[5].uri=lb://avis-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/avis/**

# certification-service
spring.cloud.gateway.routes[6].id=certification-service
spring.cloud.gateway.routes[6].uri=lb://certification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/certifications/**

# paiement-service
spring.cloud.gateway.routes[7].id=paiement-service
spring.cloud.gateway.routes[7].uri=lb://paiement-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/paiements/**

# commande-service (commandes + litiges, cf. LitigeController)
spring.cloud.gateway.routes[8].id=commande-service
spring.cloud.gateway.routes[8].uri=lb://commande-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/commandes/**,/api/litiges/**

# notification-service
spring.cloud.gateway.routes[9].id=notification-service
spring.cloud.gateway.routes[9].uri=lb://notification-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/notifications/**

# ===================================================================
# Configuration Actuator (Optionnel - Pour le suivi de la sante)
# ===================================================================
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
