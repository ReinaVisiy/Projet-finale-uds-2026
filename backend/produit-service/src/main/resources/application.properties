spring.application.name=produit-service

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/produit_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:2026}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# App
server.port=${PORT:8082}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

#URL
avis.service.url=${AVIS_SERVICE_URL:http://localhost:8085}
certification.service.url=${CERTIFICATION_SERVICE_URL:http://localhost:8086}
utilisateur.service.url=${UTILISATEUR_SERVICE_URL:http://localhost:8081}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8089}

# Eureka Client - enregistrement aupres du serveur de decouverte AGRYCAM
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
