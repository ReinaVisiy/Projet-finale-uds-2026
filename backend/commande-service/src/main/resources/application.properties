# Configuration de l'application Spring Boot pour le microservice de commande

# Server configuration
server.port=${PORT:8088}
spring.application.name=commande-service

# Spring Data JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# PostgreSQL Database configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/commande_db}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:2026}

# JWT
jwt.secret=${JWT_SECRET:AgryCamSecuriseCleJWT2026UniversiteDschang}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Services externes (validation inter-services)
produit.service.url=${PRODUIT_SERVICE_URL:http://localhost:8082}
utilisateur.service.url=${UTILISATEUR_SERVICE_URL:http://localhost:8081}
paiement.service.url=${PAIEMENT_SERVICE_URL:http://localhost:8090}

# Eureka Client - enregistrement aupres du serveur de decouverte AGRYCAM
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
