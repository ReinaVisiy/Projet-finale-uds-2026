server.port=${PORT:8081}
spring.application.name=utilisateur-service

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/utilisateur_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:2026}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Secret partage pour l'appel interne inter-services (auth-service -> ici)
# sur /api/utilisateurs/credentials. Ce endpoint doit rester accessible sans
# JWT utilisateur (il sert justement a etablir le JWT pendant la connexion),
# mais ne doit pas etre ouvert au public : voir UtilisateurController.
internal.service.secret=${INTERNAL_SERVICE_SECRET}

# Envoi d'emails (confirmation d'inscription, reinitialisation de mot de
# passe) via le compte Gmail dedie au projet - cf. MailService.
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:agriconnect.auth@gmail.com}
spring.mail.password=${SMTP_PASSWORD:imlt qoip bgfe fusy}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${SMTP_FROM:agriconnect <agriconnect.auth@gmail.com>}


spring.cloud.discovery.enabled=true
spring.cloud.config.enabled=false
spring.config.import=optional:configserver:http://localhost:8888

# Eureka Client - enregistrement aupres du serveur de decouverte AGRYCAM
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true